# =============================================================================
#  docker-compose.yml — ambiente de desenvolvimento local do SCSI
#
#  Servicos: app, db, celery_worker, celery_beat, rabbitmq, redis, traefik
#  Traefik e opcional em local (use --profile traefik para subi-lo).
#  Rede: bridge unica para desenvolvimento (simples).
# =============================================================================

services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-scsi}
      POSTGRES_USER: ${POSTGRES_USER:-scsi}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-scsi}
    volumes:
      - scsi_dev_postgres:/var/lib/postgresql/data
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U "$$POSTGRES_USER" -d "$$POSTGRES_DB"']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - scsi_dev

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - scsi_dev_redis:/data
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - scsi_dev

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-scsi}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-scsi}
    volumes:
      - scsi_dev_rabbitmq:/var/lib/rabbitmq
    ports:
      - '5672:5672'
      - '15672:15672'
    healthcheck:
      test: ['CMD', 'rabbitmq-diagnostics', 'check_port_connectivity']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s
    networks:
      - scsi_dev

  app:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # Sobrescreve os hosts para os servicamentos do compose (dev local).
      DATABASE_URL: postgres://${POSTGRES_USER:-scsi}:${POSTGRES_PASSWORD:-scsi}@db:5432/${POSTGRES_DB:-scsi}
      CELERY_BROKER_URL: amqp://${RABBITMQ_DEFAULT_USER:-scsi}:${RABBITMQ_DEFAULT_PASS:-scsi}@rabbitmq:5672//
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    volumes:
      - .:/app
      - scsi_dev_media:/app/media
      - scsi_dev_staticfiles:/app/staticfiles
    ports:
      - '8000:8000'
    healthcheck:
      test: ['CMD-SHELL', 'curl -fsS http://localhost:8000/health/ || exit 1']
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s
    networks:
      - scsi_dev

  celery_worker:
    build: .
    restart: unless-stopped
    entrypoint: /app/entrypoint.celery.sh
    command: celery -A core worker -l info
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-scsi}:${POSTGRES_PASSWORD:-scsi}@db:5432/${POSTGRES_DB:-scsi}
      CELERY_BROKER_URL: amqp://${RABBITMQ_DEFAULT_USER:-scsi}:${RABBITMQ_DEFAULT_PASS:-scsi}@rabbitmq:5672//
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    volumes:
      - .:/app
      - scsi_dev_media:/app/media
    healthcheck:
      test: ['CMD-SHELL', 'celery -A core inspect ping -d celery@$$HOSTNAME || exit 1']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    networks:
      - scsi_dev

  celery_beat:
    build: .
    restart: unless-stopped
    entrypoint: /app/entrypoint.celery.sh
    command: celery -A core beat -l info
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-scsi}:${POSTGRES_PASSWORD:-scsi}@db:5432/${POSTGRES_DB:-scsi}
      CELERY_BROKER_URL: amqp://${RABBITMQ_DEFAULT_USER:-scsi}:${RABBITMQ_DEFAULT_PASS:-scsi}@rabbitmq:5672//
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    volumes:
      - .:/app
    healthcheck:
      test: ['CMD-SHELL', 'pgrep -f "celery.*beat" || exit 1']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    networks:
      - scsi_dev

  # Traefik e opcional em ambiente local (PRD 31.2). Suba com:
  #   docker compose --profile traefik up
  traefik:
    profiles: ['traefik']
    image: traefik:v3.3
    restart: unless-stopped
    command:
      - --api.insecure=true
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
    ports:
      - '80:80'
      - '8080:8080'
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - scsi_dev

volumes:
  scsi_dev_postgres:
  scsi_dev_redis:
  scsi_dev_rabbitmq:
  scsi_dev_media:
  scsi_dev_staticfiles:

networks:
  scsi_dev:
    driver: bridge