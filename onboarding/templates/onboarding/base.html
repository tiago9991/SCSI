{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="utf-8">
    <meta http-equiv="x-ua-compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}SCSI{% endblock %} · Gestão para Corretora de Seguros</title>
    <style>
        :root {
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
            --primary-soft: #dbeafe;
            --ink: #0f172a;
            --muted: #64748b;
            --surface: #ffffff;
            --canvas: #f1f5f9;
            --border: #e2e8f0;
            --accent: #7c3aed;
            --danger: #dc2626;
            --radius: 12px;
            --shadow-sm: 0 1px 2px rgba(15, 23, 42, .06);
            --shadow: 0 10px 25px rgba(15, 23, 42, .08);
            --shadow-lg: 0 20px 45px rgba(15, 23, 42, .12);
        }
        * { box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body {
            margin: 0;
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            color: var(--ink);
            background: var(--surface);
            line-height: 1.5;
        }
        a { color: var(--primary); text-decoration: none; }
        a:hover { text-decoration: underline; }
        img { max-width: 100%; display: block; }
        .container { max-width: 1140px; margin: 0 auto; padding: 0 1.25rem; }

        /* Header */
        .site-header {
            position: sticky; top: 0; z-index: 50;
            background: rgba(255, 255, 255, .9);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
        }
        .site-header .container { display: flex; align-items: center; justify-content: space-between; padding: .85rem 1.25rem; }
        .brand { display: flex; align-items: center; gap: .55rem; color: var(--ink); }
        .brand:hover { text-decoration: none; }
        .brand-mark { width: 36px; height: 36px; border-radius: 10px; background: var(--primary); color: #fff; display: grid; place-items: center; font-weight: 800; }
        .brand-name { font-size: 1.05rem; font-weight: 700; letter-spacing: -.01em; }
        .brand-name small { display: block; font-size: .68rem; font-weight: 400; color: var(--muted); margin-top: 1px; }
        .nav-cta { display: flex; align-items: center; gap: .55rem; }
        .btn { display: inline-flex; align-items: center; justify-content: center; gap: .4rem; font-size: .92rem; font-weight: 600; padding: .55rem 1.1rem; border-radius: 8px; border: 1px solid transparent; cursor: pointer; transition: background .15s, border-color .15s, color .15s; }
        .btn-primary { background: var(--primary); color: #fff; border-color: var(--primary); }
        .btn-primary:hover { background: var(--primary-dark); border-color: var(--primary-dark); text-decoration: none; }
        .btn-outline { background: transparent; color: var(--ink); border-color: var(--border); }
        .btn-outline:hover { background: var(--canvas); text-decoration: none; }
        .btn-ghost { background: transparent; color: var(--ink); }
        .btn-ghost:hover { background: var(--canvas); text-decoration: none; }
        .btn-lg { font-size: 1rem; padding: .75rem 1.4rem; }
        .btn-block { width: 100%; }
        .btn[disabled], .btn[aria-disabled="true"] { cursor: not-allowed; opacity: .65; pointer-events: none; }

        /* Hero */
        .hero { padding: 5.5rem 0 4rem; background: radial-gradient(circle at 25% 10%, var(--primary-soft), #fff 60%); }
        .hero-inner { max-width: 760px; margin: 0 auto; text-align: center; }
        .eyebrow { display: inline-flex; align-items: center; gap: .4rem; font-size: .78rem; font-weight: 600; color: var(--primary-dark); background: var(--primary-soft); padding: .35rem .75rem; border-radius: 999px; margin-bottom: 1.25rem; }
        .hero h1 { font-size: clamp(2.1rem, 5vw, 3.4rem); line-height: 1.1; margin: 0 0 1rem; font-weight: 800; letter-spacing: -.02em; }
        .hero p.lead { font-size: 1.12rem; color: var(--muted); margin: 0 auto 2rem; max-width: 640px; }
        .hero-cta { display: inline-flex; gap: .75rem; flex-wrap: wrap; justify-content: center; }

        /* Venue for an extra two-column feature strip below the hero */
        .features { padding: 4rem 0; }
        .features-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 1.5rem; }
        .feature { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.5rem; box-shadow: var(--shadow-sm); }
        .feature .ico { width: 42px; height: 42px; border-radius: 10px; background: var(--primary-soft); color: var(--primary-dark); display: grid; place-items: center; font-size: 1.2rem; margin-bottom: 1rem; font-weight: 700; }
        .feature h3 { margin: 0 0 .4rem; font-size: 1.05rem; }
        .feature p { margin: 0; color: var(--muted); font-size: .92rem; }

        /* Plans */
        .plans { padding: 4rem 0 5rem; background: var(--canvas); }
        .plans-head { text-align: center; margin-bottom: 2.5rem; }
        .plans-head h2 { font-size: 2rem; margin: 0 0 .5rem; }
        .plans-head p { color: var(--muted); margin: 0; }
        .plans-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 1.5rem; align-items: stretch; }
        .plan { position: relative; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 2rem 1.75rem; box-shadow: var(--shadow-sm); display: flex; flex-direction: column; }
        .plan.featured { border-color: var(--primary); box-shadow: var(--shadow); }
        .plan-name { font-size: 1.15rem; font-weight: 700; margin: 0 0 .35rem; }
        .plan-price { font-size: 2rem; font-weight: 800; margin: 0 0 .75rem; }
        .plan-price small { font-size: .85rem; font-weight: 500; color: var(--muted); }
        .plan-desc { color: var(--muted); font-size: .9rem; margin: 0 0 1.5rem; min-height: 2.5em; }
        .plan .btn { margin-top: auto; }
        .tag { display: inline-flex; align-items: center; gap: .3rem; font-size: .68rem; font-weight: 700; text-transform: uppercase; letter-spacing: .05em; padding: .25rem .55rem; border-radius: 6px; background: var(--primary-soft); color: var(--primary-dark); position: absolute; top: 1rem; right: 1rem; }
        .tag-soon { background: #fef3c7; color: #92400e; }

        .site-footer { padding: 2rem 0; border-top: 1px solid var(--border); color: var(--muted); font-size: .85rem; text-align: center; }

        /* Form (signup) */
        .screen { min-height: 100vh; display: grid; place-items: center; padding: 2rem 1rem; background: var(--canvas); }
        .auth-card { width: 100%; max-width: 520px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow); padding: 2.25rem 2rem; }
        .auth-card h1 { font-size: 1.4rem; margin: 0 0 .25rem; }
        .auth-card .lead { color: var(--muted); font-size: .92rem; margin: 0 0 1.5rem; }
        fieldset { border: 1px solid var(--border); border-radius: 10px; padding: 1.25rem 1.25rem 1rem; margin: 0 0 1rem; background: #fcfdff; }
        legend { font-size: .8rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; padding: 0 .5rem; }
        form { display: flex; flex-direction: column; gap: .85rem; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: .85rem; }
        @media (max-width: 540px) { .grid-2 { grid-template-columns: 1fr; } }
        .field label { display: block; font-size: .82rem; font-weight: 600; margin-bottom: .3rem; }
        .field input { width: 100%; padding: .6rem .8rem; font-size: .92rem; border: 1px solid var(--border); border-radius: 8px; background: #fff; color: var(--ink); transition: border-color .15s, box-shadow .15s; }
        .field input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-soft); }
        .field .helptext { color: var(--muted); font-size: .76rem; margin-top: .3rem; }
        .field .errorlist { color: var(--danger); font-size: .8rem; margin: .3rem 0 0; padding-left: 1.1rem; }
        .errors, .non-field-errors { background: #fef2f2; border: 1px solid #fecaca; color: var(--danger); padding: .55rem .75rem; border-radius: 8px; font-size: .85rem; }
        .errors ul, .non-field-errors ul { margin: 0; padding-left: 1.1rem; }
        .messages { list-style: none; padding: 0; margin: 0 0 1rem; display: flex; flex-direction: column; gap: .5rem; }
        .messages li { background: var(--primary-soft); color: var(--primary-dark); border-radius: 8px; padding: .55rem .75rem; font-size: .85rem; }
        .bottom-link { margin-top: 1.25rem; text-align: center; font-size: .88rem; color: var(--muted); }
        .bottom-link a { color: var(--primary); font-weight: 600; }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body>
    {% block body %}{% endblock %}
</body>
</html>
